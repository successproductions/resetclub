name: Deploy to CloudPanel

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: 91.98.229.108
        username: ${{ secrets.SSH_USERNAME }}
        password: ${{ secrets.SSH_PASSWORD }}
        script_stop: true
        script: |
          set -e
          APP_PORT=3005

          # Load Node.js 
          export PATH="$HOME/.nvm/versions/node/$(ls $HOME/.nvm/versions/node/ | tail -1)/bin:$PATH"
          source ~/.bashrc || true
          source ~/.profile || true
          
          # Navigate to project directory
          cd htdocs/resetclub.ma
          
          # Sync server checkout with latest main
          git fetch origin main
          git reset --hard origin/main
          
          # Install dependencies and build
          npm ci
          npm run build
          
          # Restart the application as a single PM2 process
          if ! command -v pm2 >/dev/null 2>&1; then
            npm install -g pm2
          fi

          pm2 delete resetclub || true

          # Free the app port if a stale process is still holding it
          if command -v fuser >/dev/null 2>&1; then
            fuser -k "${APP_PORT}/tcp" || true
          fi
          if command -v lsof >/dev/null 2>&1; then
            PORT_PIDS=$(lsof -ti tcp:"${APP_PORT}" || true)
            if [ -n "$PORT_PIDS" ]; then
              kill -TERM $PORT_PIDS || true
              sleep 2
              kill -KILL $PORT_PIDS || true
            fi
          fi

          PORT="$APP_PORT" pm2 start npm --name "resetclub" -- start
          
          # Save PM2 configuration
          pm2 save || true
          
    - name: Deployment notification
      if: success()
      run: echo "Deployment completed successfully!"
